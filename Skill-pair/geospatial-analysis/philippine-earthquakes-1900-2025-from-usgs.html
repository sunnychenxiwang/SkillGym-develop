    <script nonce="59wlCvP/ivNmNotlvgDFvA==" type="application/ld+json">{"@context":"http://schema.org/","@type":"Dataset","name":"🇵🇭 Philippine Earthquakes 1900-2026 (from USGS)","description":"## Banner\n![](https://www.googleapis.com/download/storage/v1/b/kaggle-user-content/o/inbox%2F1842206%2Fd3081fbb6ec3c04548fa1a141c9c5bb1%2F_c3019c49-6433-4401-9bb1-a5df2e10afa3.jpeg?generation=1760319593856581&amp;alt=media)\n\n## What is USGS?\n&gt; The United States Geological Survey (USGS), founded as the Geological Survey, is an agency of the United States Department of the Interior whose work spans the disciplines of biology, geography, geology, and hydrology. The agency was founded on March 3, 1879, to study the landscape of the United States, its natural resources, and the natural hazards that threaten it. The agency also makes maps of planets and moons, based on data from U.S. space probes.\n\nFrom http://en.wikipedia.org/wiki/United_States_Geological_Survey\n\n## (The) Philippines is prone to earthquakes\n&gt; **The Philippines** lies within the zone of complex interaction between several tectonic plates, involving multiple subduction zones and one large zone of strike-slip, all of which are associated with major earthquakes. Many intraplate earthquakes of smaller magnitude also occur very regularly due to the interaction between the major tectonic plates in the region. \n\nFrom https://en.wikipedia.org/wiki/List_of_earthquakes_in_the_Philippines#Seismicity\n\n&gt; Given the presence of major fault zones throughout the archipelago, any part of the Philippines may be affected by earthquakes, apart from parts of Palawan, where the seismic hazard risk is comparatively low. \n\nFrom https://en.wikipedia.org/wiki/List_of_earthquakes_in_the_Philippines#Seismic_hazard\n\n## Data Source\nlook at **\"query\"** in https://earthquake.usgs.gov/fdsnws/event/1/\n\n## Data Dictionary\n- https://earthquake.usgs.gov/data/comcat/index.php\n- https://earthquake.usgs.gov/earthquakes/feed/v1.0/geojson.php\n- https://earthquake.usgs.gov/earthquakes/feed/v1.0/geojson_detail.php\n\n## Navigate to geojson event detail(s)\n-  https://earthquake.usgs.gov/fdsnws/event/1/query?eventid=XXXXX&amp;format=geojson\n\nwhere **XXXXX** is Id of the event\n\n## Missing Data\n&gt; **We may not rapidly locate earthquakes smaller than 5.0 outside the U.S. unless they have caused significant damage or are widely felt**. Earthquakes this small rarely cause significant damage. At times, some other agency may report an earthquake with a larger magnitude than what we compute from our data, especially for non-U.S. events near magnitude 5.0. If our magnitude for the event is less than magnitude 5.0, we may not issue a rapid report for it.\n\n[About Missing Data](https://earthquake.usgs.gov/earthquakes/map/?extent=19.43551,-137.19727&amp;extent=53.43572,-52.82227&amp;list=false&amp;map=false&amp;about=true&amp;help=missing)\n\n## Related Dataset\n[🇵🇭 Philippine Earthquakes (from PHIVOLCS)](https://www.kaggle.com/datasets/bwandowando/philippine-earthquakes-from-phivolcs)\n\n## Image\nGenerated with Bing Image Generator","url":"https://www.kaggle.com/bwandowando/philippine-earthquakes-1900-2025-from-usgs","version":39,"keywords":["subject, earth and nature","data type, tabular","subject, earth and nature, earth science","subject, science and technology, research","subject, earth and nature, environment, natural disasters"],"license":{"@type":"CreativeWork","name":"Apache 2.0","url":"https://www.apache.org/licenses/LICENSE-2.0"},"identifier":["8473727"],"includedInDataCatalog":{"@type":"DataCatalog","name":"Kaggle","url":"https://www.kaggle.com"},"creator":{"@type":"Person","name":"BwandoWando","url":"https://www.kaggle.com/bwandowando","image":"https://storage.googleapis.com/kaggle-avatars/thumbnails/1842206-kg.jpg?t=2026-02-19-06-04-41"},"distribution":[{"@type":"DataDownload","requiresSubscription":true,"encodingFormat":"zip","fileFormat":"zip","contentUrl":"https://www.kaggle.com/datasets/bwandowando/philippine-earthquakes-1900-2025-from-usgs/download?datasetVersionNumber=39","contentSize":"1691207 bytes"}],"commentCount":0,"dateModified":"2026-04-01T05:15:32.25Z","discussionUrl":"https://www.kaggle.com/bwandowando/philippine-earthquakes-1900-2025-from-usgs/discussion","alternateName":"🇵🇭 Philippine Earthquakes 1900-2026 from United States Geological Survey","isAccessibleForFree":true,"thumbnailUrl":"https://storage.googleapis.com/kaggle-datasets-images/8473727/13359470/003bd020c9c6cd4545b7c981292143a7/dataset-card.jpeg?t=2025-10-13-01-36-07","interactionStatistic":[{"@type":"InteractionCounter","interactionType":"http://schema.org/CommentAction","userInteractionCount":0},{"@type":"InteractionCounter","interactionType":"http://schema.org/DownloadAction","userInteractionCount":154},{"@type":"InteractionCounter","interactionType":"http://schema.org/ViewAction","userInteractionCount":1140},{"@type":"InteractionCounter","interactionType":"http://schema.org/LikeAction","userInteractionCount":4}]}</script>
